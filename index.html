<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>현장배치 현황판</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f13;color:#ccc}

.wrap{padding:12px;max-width:420px;margin:0 auto}

/* 헤더 */
.top-bar{display:flex;align-items:center;justify-content:center;position:relative;padding:10px 0 4px}
.app-title{font-size:20px;font-weight:600;color:#fff}
.version-badge{display:inline-block;background:#1a73e8;color:#fff;font-size:11px;padding:2px 8px;border-radius:6px;margin-left:6px;vertical-align:middle}
.sub-title{font-size:12px;color:#444;text-align:center;padding:2px 0 10px}
.settings-btn{position:absolute;right:0;top:10px;background:none;border:none;cursor:pointer;color:#555;font-size:22px;line-height:1}
.sync-msg{font-size:12px;color:#555;text-align:center;margin-bottom:8px;min-height:16px}

/* 설정 패널 */
.settings-panel{display:none;background:#1a1a24;border-radius:12px;padding:14px;margin-bottom:12px;border:0.5px solid #2a2a35}
.settings-panel.show{display:block}
.settings-panel label{font-size:12px;color:#666;display:block;margin-bottom:4px}
.settings-panel input{width:100%;font-size:14px;padding:9px 12px;border:0.5px solid #2a2a35;border-radius:8px;background:#0f0f13;color:#fff;margin-bottom:10px}
.settings-panel button{width:100%;padding:10px;font-size:14px;font-weight:600;border:none;border-radius:8px;background:#1a73e8;color:#fff;cursor:pointer}

/* 상단 요약 */
.summary-bar{display:flex;gap:8px;margin-bottom:12px}
.summary-card{flex:1;border-radius:10px;padding:10px 8px;text-align:center;background:#1a1a24;border:0.5px solid #2a2a35}
.summary-card .s-num{font-size:26px;font-weight:700;line-height:1}
.summary-card.red .s-num{color:#f87171}
.summary-card.yellow .s-num{color:#fbbf24}
.summary-card.green .s-num{color:#4ade80}
.summary-card .s-label{font-size:10px;color:#555;margin-top:3px}

/* 진행률 바 */
.progress-bar-wrap{background:#1a1a24;border-radius:10px;padding:10px 14px;margin-bottom:12px;border:0.5px solid #2a2a35}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progress-top span{font-size:12px;color:#888}
.progress-top strong{font-size:12px;color:#fff}
.progress-track{background:#0f0f13;border-radius:4px;height:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#1a73e8,#4ade80);transition:width 0.4s}
.progress-missing{font-size:11px;color:#f87171;margin-top:6px}

/* 탭 */
.tab-bar{display:flex;background:#1a1a24;border-radius:10px;padding:3px;gap:2px;margin-bottom:12px}
.tab{flex:1;text-align:center;padding:7px 4px;font-size:12px;cursor:pointer;color:#555;border-radius:7px}
.tab.active{background:#2a2a35;color:#fff;font-weight:500}
.section{display:none}
.section.active{display:block}

/* 표 보기 */
.matrix-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.matrix{width:100%;border-collapse:collapse;font-size:10px}
.matrix th{background:#1a1a24;padding:7px 3px;text-align:center;font-weight:500;font-size:10px;color:#555;border:0.5px solid #2a2a35;white-space:nowrap}
.matrix td{padding:5px 2px;text-align:center;border:0.5px solid #2a2a35;font-size:10px;white-space:nowrap;background:#0f0f13}
.matrix td.rh{background:#1a1a24;font-weight:500;font-size:11px;color:#ccc;padding:5px 6px}
.matrix td.today-col{background:#1a1a24}

/* 카드 보기 */
.card-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
.site-card{background:#1a1a24;border:0.5px solid #2a2a35;border-radius:10px;padding:8px}
.site-card.bibun{background:#111118;border-color:#222}
.site-name{font-size:12px;font-weight:500;color:#ccc;margin-bottom:5px;border-bottom:0.5px solid #2a2a35;padding-bottom:4px}
.site-name.bibun{color:#444}
.card-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;font-size:10px;color:#555}
.card-row.highlight{color:#fff}

/* 조별 요약 */
.cho-summary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.cho-summary-card{background:#1a1a24;border:0.5px solid #2a2a35;border-radius:12px;padding:12px}
.cho-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cho-dot{width:7px;height:7px;border-radius:50%;background:#555;display:inline-block}
.cho-dot.done{background:#4ade80}
.cho-dot.miss{background:#f87171}
.cho-last{font-size:11px;color:#666;margin-bottom:4px}
.cho-last span{color:#ccc;font-weight:500}
.cho-recommend{font-size:11px;color:#666;margin-bottom:6px}
.cho-recommend span{color:#f87171;font-weight:600}

/* 히스토리 */
.history-list{margin-top:8px;border-top:0.5px solid #2a2a35;padding-top:6px}
.history-row{display:flex;justify-content:space-between;font-size:10px;color:#555;padding:2px 0}
.history-row span:last-child{color:#888}

/* 배지 */
.dg{background:#1a3a1a;color:#4ade80;padding:2px 6px;border-radius:5px;font-size:10px;font-weight:700}
.dy{background:#3a2a00;color:#fbbf24;padding:2px 6px;border-radius:5px;font-size:10px;font-weight:700}
.dr{background:#3a1a1a;color:#f87171;padding:2px 6px;border-radius:5px;font-size:10px;font-weight:700}
.dn{background:#1a1a24;color:#444;padding:2px 6px;border-radius:5px;font-size:10px}
.db{background:#111118;color:#333;padding:2px 6px;border-radius:5px;font-size:10px}

/* 입력 섹션 */
.input-section{margin-top:16px;border-top:0.5px solid #2a2a35;padding-top:14px}
.unlocked{display:none}
.unlocked.show{display:block}
.date-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.date-row label{font-size:13px;color:#666;white-space:nowrap}
.date-row input{flex:1;font-size:14px;padding:9px 12px;border:0.5px solid #2a2a35;border-radius:8px;background:#1a1a24;color:#fff}

/* 진행률 미니 */
.input-progress{font-size:11px;color:#555;margin-bottom:10px;padding:8px 12px;background:#1a1a24;border-radius:8px;border:0.5px solid #2a2a35}
.input-progress strong{color:#4ade80}
.input-progress .missing{color:#f87171}

.cho-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.cho-btn{padding:13px 8px;font-size:16px;font-weight:600;border:0.5px solid #2a2a35;border-radius:12px;background:#1a1a24;color:#ccc;cursor:pointer;text-align:center;position:relative}
.cho-btn.done{border-color:#4ade80;color:#4ade80}
.cho-btn.miss-dot::after{content:'';position:absolute;top:6px;right:8px;width:7px;height:7px;background:#f87171;border-radius:50%}
.cho-btn:active{background:#2a2a35}
.save-btn{width:100%;padding:12px;font-size:15px;font-weight:600;border:none;border-radius:12px;background:#1a73e8;color:#fff;cursor:pointer;margin-top:12px}
.save-btn:active{background:#1558c0}
.save-msg{font-size:12px;color:#555;text-align:center;margin-top:8px;min-height:16px}

/* 팝업 */
.popup-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:flex-start;justify-content:center;padding-top:60px;z-index:100}
.popup-overlay.show{display:flex}
.popup-box{background:#1a1a24;border:0.5px solid #2a2a35;border-radius:16px;width:92%;max-width:340px;overflow:hidden;max-height:85vh;display:flex;flex-direction:column}
.popup-header{padding:14px 16px;border-bottom:0.5px solid #2a2a35;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.popup-header span{font-size:17px;font-weight:600;color:#fff}
.popup-close{background:none;border:none;font-size:24px;color:#555;cursor:pointer;line-height:1;padding:0}
.popup-history{padding:10px 16px;background:#0f0f13;border-bottom:0.5px solid #2a2a35;flex-shrink:0}
.popup-history-title{font-size:11px;color:#555;margin-bottom:6px}
.popup-history-row{display:flex;justify-content:space-between;font-size:11px;color:#666;padding:2px 0}
.popup-history-row span:last-child{color:#888}
.popup-list{padding:4px 0;overflow-y:auto}
.popup-item{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;cursor:pointer;border-bottom:0.5px solid #2a2a35}
.popup-item:last-child{border-bottom:none}
.popup-item:active{background:#2a2a35}
.popup-item.bibun-item .snm{color:#444}
.popup-item .snm{font-size:16px;color:#ccc}
.popup-item.longest .snm{color:#fff;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <span class="app-title">현장배치 현황판<span class="version-badge">v2.1</span></span>
    <button class="settings-btn" onclick="toggleSettings()" aria-label="설정"><i class="ti ti-settings"></i></button>
  </div>
  <div class="sub-title">근무 배치 참고용 현황</div>

  <div class="settings-panel" id="settingsPanel">
    <label>관리자 비밀번호</label>
    <input type="password" id="pwInput" placeholder="비밀번호 입력" />
    <button onclick="checkPw()">확인</button>
  </div>
  <div class="sync-msg" id="syncMsg"></div>

  <!-- 상단 요약 -->
  <div class="summary-bar">
    <div class="summary-card red"><div class="s-num" id="sumRed">0</div><div class="s-label">🔴 긴급 8일+</div></div>
    <div class="summary-card yellow"><div class="s-num" id="sumYellow">0</div><div class="s-label">🟡 주의 5~7일</div></div>
    <div class="summary-card green"><div class="s-num" id="sumGreen">0</div><div class="s-label">🟢 양호 1~4일</div></div>
  </div>

  <!-- 오늘 입력 진행률 -->
  <div class="progress-bar-wrap" id="progressWrap" style="display:none">
    <div class="progress-top">
      <span>오늘 입력 현황</span>
      <strong id="progressText">0 / 10</strong>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-missing" id="progressMissing"></div>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('table')">표 보기</div>
    <div class="tab" onclick="switchTab('card')">카드 보기</div>
    <div class="tab" onclick="switchTab('cho')">조별 보기</div>
  </div>

  <div class="section active" id="sec-table">
    <div class="matrix-wrap"><table class="matrix" id="matrixTable"></table></div>
  </div>
  <div class="section" id="sec-card">
    <div class="card-grid" id="cardGrid"></div>
  </div>
  <div class="section" id="sec-cho">
    <div class="cho-summary-grid" id="choGrid2"></div>
  </div>

  <div class="input-section">
    <div class="unlocked" id="unlockedArea">
      <div class="date-row">
        <label>날짜</label>
        <input type="date" id="dateInput" onchange="updateInputProgress()" />
      </div>
      <div class="input-progress" id="inputProgress"></div>
      <div class="cho-grid" id="choGrid"></div>
      <button class="save-btn" onclick="saveData()">저장하기</button>
      <div class="save-msg" id="saveMsg"></div>
    </div>
  </div>
</div>

<div class="popup-overlay" id="popupOverlay">
  <div class="popup-box">
    <div class="popup-header">
      <span id="popupTitle"></span>
      <button class="popup-close" onclick="closePopup()"><i class="ti ti-x"></i></button>
    </div>
    <div class="popup-history" id="popupHistory"></div>
    <div class="popup-list" id="popupList"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBN3K0UrSHL6rw6i3EZeDXDwcwzvVDThL8",
  authDomain: "baechi-4535c.firebaseapp.com",
  databaseURL: "https://baechi-4535c-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "baechi-4535c",
  storageBucket: "baechi-4535c.firebasestorage.app",
  messagingSenderId: "470541796141",
  appId: "1:470541796141:web:21fc0cf6fc1f6c21c009a4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const CHO=[1,2,3,5,6,7,8,9,10,11];
const SITES=['성우','대양','제이','씨월드','자동차','삼호철판','쌀','지원','참치','대불','당직','파이프','비번'];
const PW='100410004';
let data={};
let currentCho=null;

function today(){return new Date().toISOString().slice(0,10)}

function dayDiff(d){
  if(!d) return null;
  const a=new Date(d),b=new Date();
  a.setHours(0,0,0,0);b.setHours(0,0,0,0);
  return Math.floor((b-a)/86400000);
}

function badge(diff,site){
  if(site==='비번') return '<span class="db">비번</span>';
  if(diff===null) return '<span class="dn">-</span>';
  if(diff<=4) return `<span class="dg">D+${diff}</span>`;
  if(diff<=7) return `<span class="dy">D+${diff}</span>`;
  return `<span class="dr">D+${diff}</span>`;
}

function getLast(cho,site){return data[`${cho}_${site}`]||null}

// 조의 최근 히스토리 (날짜순 최근 5개)
function getChoHistory(cho){
  const entries=[];
  SITES.forEach(s=>{
    const d=data[`${cho}_${s}`];
    if(d) entries.push({site:s,date:d});
  });
  return entries.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
}

// 조의 오늘 배치 여부
function isChoToday(cho){
  return SITES.some(s=>data[`${cho}_${s}`]===today());
}

// 오늘 미입력 조
function getMissingCho(){
  const t=document.getElementById('dateInput').value||today();
  return CHO.filter(c=>!SITES.some(s=>data[`${c}_${s}`]===t));
}

// 상단 요약
function updateSummary(){
  let red=0,yellow=0,green=0;
  CHO.forEach(c=>{
    SITES.filter(s=>s!=='비번').forEach(s=>{
      const d=dayDiff(getLast(c,s));
      if(d===null) return;
      if(d>=8) red++;
      else if(d>=5) yellow++;
      else if(d>=1) green++;
    });
  });
  document.getElementById('sumRed').textContent=red;
  document.getElementById('sumYellow').textContent=yellow;
  document.getElementById('sumGreen').textContent=green;
}

// 진행률 바 (현황판용)
function updateProgressBar(){
  const t=today();
  const done=CHO.filter(c=>SITES.some(s=>data[`${c}_${s}`]===t)).length;
  const total=CHO.length;
  const wrap=document.getElementById('progressWrap');
  if(done>0){
    wrap.style.display='block';
    document.getElementById('progressText').textContent=`${done} / ${total}`;
    document.getElementById('progressFill').style.width=`${(done/total)*100}%`;
    const missing=CHO.filter(c=>!SITES.some(s=>data[`${c}_${s}`]===t));
    document.getElementById('progressMissing').textContent=
      missing.length>0?`미입력: ${missing.map(c=>c+'조').join(', ')}`:'모든 조 입력 완료!';
  } else {
    wrap.style.display='none';
  }
}

// 입력창 진행률
window.updateInputProgress=function(){
  const t=document.getElementById('dateInput').value||today();
  const done=CHO.filter(c=>SITES.some(s=>data[`${c}_${s}`]===t));
  const missing=CHO.filter(c=>!SITES.some(s=>data[`${c}_${s}`]===t));
  const el=document.getElementById('inputProgress');
  el.innerHTML=`<strong>${done.length}개 완료</strong> / 10개조 ${missing.length>0?`<span class="missing">· 미입력: ${missing.map(c=>c+'조').join(' ')}</span>`:'· ✅ 전체 완료'}`;
  renderChoGrid();
}

function renderMatrix(){
  const t=today();
  let h='<tr><th>조</th>';
  SITES.forEach(s=>h+=`<th>${s}</th>`);
  h+='</tr>';
  CHO.forEach(c=>{
    h+=`<tr><td class="rh">${c}조</td>`;
    SITES.forEach(s=>{
      const d=getLast(c,s);
      const diff=dayDiff(d);
      const isToday=d===t;
      h+=`<td${isToday?' class="today-col"':''}>${badge(diff,s)}</td>`;
    });
    h+='</tr>';
  });
  document.getElementById('matrixTable').innerHTML=h;
}

function renderCards(){
  const grid=document.getElementById('cardGrid');
  grid.innerHTML='';
  SITES.forEach(s=>{
    const isBibun=s==='비번';
    const card=document.createElement('div');
    card.className='site-card'+(isBibun?' bibun':'');

    // 현장별 가장 오래된 조 찾기
    let maxDiff=-1,maxCho=null;
    if(!isBibun){
      CHO.forEach(c=>{
        const d=dayDiff(getLast(c,s));
        if(d!==null&&d>maxDiff){maxDiff=d;maxCho=c;}
      });
    }

    let inner=`<div class="site-name${isBibun?' bibun':''}">${s}</div>`;
    CHO.forEach(c=>{
      const isHighlight=c===maxCho&&maxDiff>=5;
      inner+=`<div class="card-row${isHighlight?' highlight':''}"><span>${c}조</span>${badge(dayDiff(getLast(c,s)),s)}</div>`;
    });
    card.innerHTML=inner;
    grid.appendChild(card);
  });
}

function renderChoSummary(){
  const grid=document.getElementById('choGrid2');
  grid.innerHTML='';
  const t=today();
  CHO.forEach(c=>{
    let lastSite=null,lastDate=null;
    SITES.filter(s=>s!=='비번').forEach(s=>{
      const d=data[`${c}_${s}`];
      if(d&&(!lastDate||d>lastDate)){lastDate=d;lastSite=s;}
    });
    let oldestSite=null,oldestDiff=-1;
    SITES.filter(s=>s!=='비번').forEach(s=>{
      const d=dayDiff(getLast(c,s));
      if(d!==null&&d>oldestDiff){oldestDiff=d;oldestSite=s;}
    });
    const todayDone=SITES.some(s=>data[`${c}_${s}`]===t);
    const history=getChoHistory(c);

    const card=document.createElement('div');
    card.className='cho-summary-card';
    let h=`<div class="cho-title"><span class="cho-dot ${todayDone?'done':'miss'}"></span>${c}조</div>`;
    h+=`<div class="cho-last">최근: <span>${lastSite||'-'}</span></div>`;
    h+=`<div class="cho-recommend">추천: <span>${oldestSite||'-'}</span></div>`;
    h+=badge(oldestDiff>=0?oldestDiff:null,oldestSite||'');
    if(history.length>0){
      h+=`<div class="history-list">`;
      history.forEach(e=>{
        h+=`<div class="history-row"><span>${e.site}</span><span>${e.date}</span></div>`;
      });
      h+=`</div>`;
    }
    card.innerHTML=h;
    grid.appendChild(card);
  });
}

function renderChoGrid(){
  const t=document.getElementById('dateInput').value||today();
  document.getElementById('choGrid').innerHTML=CHO.map(c=>{
    const done=SITES.some(s=>data[`${c}_${s}`]===t);
    return `<button class="cho-btn${done?' done':' miss-dot'}" onclick="openPopup(${c})">${c}조</button>`;
  }).join('');
}

function renderAll(){
  renderMatrix();
  renderCards();
  renderChoSummary();
  updateSummary();
  updateProgressBar();
  if(document.getElementById('unlockedArea').classList.contains('show')) updateInputProgress();
}

window.switchTab=function(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',
    (i===0&&t==='table')||(i===1&&t==='card')||(i===2&&t==='cho')
  ));
  ['table','card','cho'].forEach(id=>
    document.getElementById('sec-'+id).classList.toggle('active',id===t)
  );
}

window.toggleSettings=function(){
  document.getElementById('settingsPanel').classList.toggle('show');
}

window.checkPw=function(){
  if(document.getElementById('pwInput').value===PW){
    document.getElementById('unlockedArea').classList.add('show');
    document.getElementById('dateInput').value=today();
    document.getElementById('settingsPanel').classList.remove('show');
    updateInputProgress();
  } else alert('비밀번호가 틀렸습니다.');
}

window.openPopup=function(cho){
  currentCho=cho;
  document.getElementById('popupTitle').textContent=`${cho}조 현장 선택`;

  // 히스토리
  const history=getChoHistory(cho);
  let hh=`<div class="popup-history-title">최근 배치 기록</div>`;
  if(history.length>0){
    history.forEach(e=>hh+=`<div class="popup-history-row"><span>${e.site}</span><span>${e.date}</span></div>`);
  } else {
    hh+=`<div style="font-size:11px;color:#444">기록 없음</div>`;
  }
  document.getElementById('popupHistory').innerHTML=hh;

  // 현장별 가장 오래된 조
  let longestSite=null,longestDiff=-1;
  SITES.filter(s=>s!=='비번').forEach(s=>{
    const d=dayDiff(getLast(cho,s));
    if(d!==null&&d>longestDiff){longestDiff=d;longestSite=s;}
  });

  document.getElementById('popupList').innerHTML=SITES.map(s=>{
    const isBibun=s==='비번';
    const isLongest=s===longestSite&&longestDiff>=5;
    return `<div class="popup-item${isBibun?' bibun-item':''}${isLongest?' longest':''}" onclick="selectSite('${s}')">
      <span class="snm">${s}${isLongest?' 추천':'　'}</span>${badge(dayDiff(getLast(cho,s)),s)}
    </div>`;
  }).join('');
  document.getElementById('popupOverlay').classList.add('show');
}

window.closePopup=function(){
  document.getElementById('popupOverlay').classList.remove('show');
  currentCho=null;
}

window.selectSite=function(site){
  const date=document.getElementById('dateInput').value;
  if(!date){alert('날짜를 먼저 선택하세요.');return}
  data[`${currentCho}_${site}`]=date;
  closePopup();
  renderAll();
  const m=document.getElementById('saveMsg');
  m.textContent=`✓ ${currentCho}조 → ${site} (${date})`;
  setTimeout(()=>m.textContent='',3000);
}

window.saveData=async function(){
  const m=document.getElementById('saveMsg');
  m.textContent='저장 중...';
  try{
    await set(ref(db,'/'),data);
    m.textContent='저장 완료!';
    setTimeout(()=>m.textContent='',3000);
  }catch(e){m.textContent='저장 실패: '+e.message}
}

async function loadData(){
  document.getElementById('syncMsg').textContent='데이터 불러오는 중...';
  try{
    const snapshot=await get(ref(db,'/'));
    if(snapshot.exists()) data=snapshot.val();
    renderAll();
    document.getElementById('syncMsg').textContent='';
  }catch(e){document.getElementById('syncMsg').textContent='불러오기 실패: '+e.message}
}

loadData();
</script>
</body>
</html>
